<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JSR AI - Powerful AI Assistant</title>
    <meta name="description" content="JSR AI - Your powerful AI assistant with chat, voice call, and history." />
    <meta name="author" content="JSR AI" />
    <meta property="og:title" content="JSR AI - Powerful AI Assistant" />
    <meta property="og:description" content="Chat, voice call, and history - all in one powerful AI." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@Lovable" />
    <meta name="twitter:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />
  </head>

  <body>
    <div style="background:#000; color:#0f0; font-family:monospace; padding:30px;">
      <h2 style="text-shadow: 0 0 10px #0f0;">⚡ JSR AI POWER PANEL</h2>
      <div style="border:1px solid #0f0; padding:20px; border-radius:10px;">
        <label>TARGET URL:</label><br>
        <input id="url" placeholder="https://hackerone.com..." style="width:100%; padding:10px; background:#111; color:#0f0; border:1px solid #0f0; margin:10px 0;" />
        <label>SECURE PASSWORD:</label><br>
        <input id="pass" type="password" placeholder="Enter Password" style="width:100%; padding:10px; background:#111; color:#0f0; border:1px solid #0f0; margin:10px 0;" />
        <button onclick="send()" style="width:100%; padding:15px; background:#0f0; color:#000; font-weight:bold; cursor:pointer; margin-top:10px;">EXECUTE ON CHROME 🚀</button>
      </div>
      <div style="margin-top:20px;">
        <label>LIVE LOGS:</label>
        <div id="logs" style="background:#050505; color:red; border:1px solid #333; height:120px; overflow:auto; padding:10px; font-size:12px;"></div>
      </div>
    </div>

    <div id="root"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js" integrity="sha512-GJFx7rZrQ1HDYUzuye2kE8EU3fSKK1KDh1N0X8eeQ4z+0UKu1PxZ8hK7bVbYwrv0QVE8PI8Pn0s+3ke8a+zFtg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script>
      async function send() {
        const passValue = document.getElementById('pass').value;
        const urlValue = document.getElementById('url').value;
        if (!urlValue) return alert('URL missing!');

        const encrypted = CryptoJS.AES.encrypt(passValue, 'JSR_AI_POWER_999').toString();

        try {
          await fetch('http://localhost:9999/jsr/send-secure', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ url: urlValue, payload: encrypted }),
          });
          alert('JSR AI: Command Sent to Bridge!');
        } catch (e) {
          alert('Error: Is Termux Python Bridge running?');
        }
      }

      setInterval(async () => {
        try {
          const res = await fetch('http://localhost:9999/jsr/get-logs');
          const data = await res.json();
          document.getElementById('logs').innerHTML = data.join('<br>');
        } catch (e) {
          // ignore when bridge is unavailable
        }
      }, 3000);
    </script>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
